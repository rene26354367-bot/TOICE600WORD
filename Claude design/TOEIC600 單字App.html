<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<title>TOEIC 600 · 背單字 App 設計</title>
<meta name="viewport" content="width=1920"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #e8e2d3; font-family: "Noto Sans TC", -apple-system, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#f4efe6"/>
    <rect x="30" y="20" width="40" height="60" rx="4" fill="#faf6ec" stroke="#a8533c" stroke-width="1.5"/>
    <text x="50" y="54" font-family="serif" font-size="16" fill="#2a2520" text-anchor="middle" font-weight="500">学</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="theme.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="scheme-a.jsx"></script>
<script type="text/babel" src="scheme-b.jsx"></script>
<script type="text/babel" src="scheme-c.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "darkMode": false
}/*EDITMODE-END*/;

function App() {
  const tweaks = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];
  const [t, setT] = tweaks;
  const dark = t.darkMode;

  const themeA = dark ? window.DARK_THEMES.A : window.THEMES.A;
  const themeB = dark ? window.DARK_THEMES.B : window.THEMES.B;
  const themeC = dark ? window.DARK_THEMES.C : window.THEMES.C;

  const schemes = [
    { id: 'A', theme: themeA, components: window.SchemeA_Dashboard ? {
      Dashboard: window.SchemeA_Dashboard, FlashCard: window.SchemeA_FlashCard, Quiz: window.SchemeA_Quiz,
      List: window.SchemeA_List, Stats: window.SchemeA_Stats, Review: window.SchemeA_Review,
    } : null },
    { id: 'B', theme: themeB, components: window.SchemeB_Dashboard ? {
      Dashboard: window.SchemeB_Dashboard, FlashCard: window.SchemeB_FlashCard, Quiz: window.SchemeB_Quiz,
      List: window.SchemeB_List, Stats: window.SchemeB_Stats, Review: window.SchemeB_Review,
    } : null },
    { id: 'C', theme: themeC, components: window.SchemeC_Dashboard ? {
      Dashboard: window.SchemeC_Dashboard, FlashCard: window.SchemeC_FlashCard, Quiz: window.SchemeC_Quiz,
      List: window.SchemeC_List, Stats: window.SchemeC_Stats, Review: window.SchemeC_Review,
    } : null },
  ];

  const pages = [
    { id: 'dashboard', label: '首頁 · Dashboard', key: 'Dashboard' },
    { id: 'flashcard', label: '單字卡 · Flashcard', key: 'FlashCard' },
    { id: 'quiz', label: '測驗 · Quiz', key: 'Quiz' },
    { id: 'list', label: '單字列表 · Word List', key: 'List' },
    { id: 'review', label: '複習排程 · Spaced Review', key: 'Review' },
    { id: 'stats', label: '學習統計 · Statistics', key: 'Stats' },
  ];

  const DC = window.DesignCanvas;
  const Section = window.DCSection;
  const Artboard = window.DCArtboard;
  const PostIt = window.DCPostIt;

  if (!DC || !schemes[0].components) {
    return <div style={{padding: 40, fontFamily: 'serif'}}>載入中…</div>;
  }

  return (
    <>
      <DC>
        <PostIt x={40} y={40} width={380}>
          <div style={{fontFamily: 'Noto Serif TC, serif', fontSize: 18, fontWeight: 600, marginBottom: 8}}>
            TOEIC 600 · 背單字 App
          </div>
          <div style={{lineHeight: 1.6, fontSize: 13}}>
            三種日系質感方向 × 六個核心頁面。<br/>
            • <b>A 紙感日誌</b>：米色紙、細線、印章朱紅<br/>
            • <b>B 柔霧靜物</b>：淡粉米、柔和漸層、圓潤現代<br/>
            • <b>C 墨跡學術</b>：深米底、墨綠、文庫本氣質<br/><br/>
            <span style={{opacity: 0.7}}>右下角 Tweaks 可切換深色 / 淺色模式</span>
          </div>
        </PostIt>

        {pages.map(page => (
          <Section key={page.id} id={page.id} title={page.label} subtitle={`三方案並列比較`}>
            {schemes.map(sch => {
              const Comp = sch.components[page.key];
              return (
                <Artboard key={sch.id} id={`${page.id}-${sch.id}`}
                          label={`${sch.id} · ${sch.theme.name}`}
                          width={336} height={696}>
                  <div style={{ width: 336, height: 696, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'transparent' }}>
                    <Comp theme={sch.theme}/>
                  </div>
                </Artboard>
              );
            })}
          </Section>
        ))}
      </DC>

      {window.TweaksPanel && (
        <window.TweaksPanel>
          <window.TweakSection title="外觀 · Appearance">
            <window.TweakToggle
              label="深色模式"
              sublabel="切換為日系夜間紙感"
              value={t.darkMode}
              onChange={v => setT({darkMode: v})}
            />
          </window.TweakSection>
          <window.TweakSection title="關於">
            <div style={{fontSize: 12, color: '#666', lineHeight: 1.5}}>
              三個方案同時切換日夜模式，可對比在不同環境下的閱讀感受。
            </div>
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
}

function mount() {
  if (!window.DesignCanvas || !window.SchemeA_Dashboard || !window.SchemeB_Dashboard || !window.SchemeC_Dashboard) {
    setTimeout(mount, 50);
    return;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
mount();
</script>
</body>
</html>
